# AI Document Search Configuration
# This file uses HOCON (Human-Optimized Config Object Notation) format

ai-document-search {
  # Notion API Configuration
  notion {
    api-key = ${?NOTION_API_KEY}
    workspace-id = ${?NOTION_WORKSPACE_ID}
  }

  # Google Drive API Configuration
  google-drive {
    credentials-path = ${?GOOGLE_CREDENTIALS_PATH}
  }

  # OpenAI API Configuration
  openai {
    api-key = ${?OPENAI_API_KEY}
    embedding-model = "text-embedding-ada-002"
  }

  # ChromaDB Configuration
  chroma {
    persist-directory = "./data/chroma"
    collection-name = "document-embeddings"
  }

  # Document Processing Configuration
  processing {
    chunk-size = 1000
    chunk-overlap = 200
  }

  # Query Configuration
  query {
    default-result-limit = 5
    max-result-limit = 20
    similarity-threshold = 0.7
    max-query-length = 500
  }

  # Performance Configuration
  performance {
    max-concurrent-queries = 10
    embedding-batch-size = 100
    query-timeout-seconds = 3
  }

  # Retry Configuration
  retry {
    max-attempts = 3
    initial-delay-ms = 1000
    max-delay-ms = 60000
    backoff-multiplier = 2.0
  }

  # Security Configuration
  security {
    encrypt-credentials = true
    enforce-https = true
  }
}
